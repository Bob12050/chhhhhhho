name: Deploy to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages so it can be tested on a
# real phone at https://<owner>.github.io/chhhhhhho/. One-time setup: in the
# repo, Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches:
      - claude/phaser-action-rpg-plan-zdgkd6
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify (typecheck, data, tests)
        run: |
          npm run typecheck
          npm run validate-data
          npm run test
      - name: Build (Pages base path)
        run: npm run build
        env:
          VITE_BASE: /chhhhhhho/
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (build_type=workflow) automatically if not already on,
          # so no manual Settings -> Pages toggle is required.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
