name: Deploy to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages so it can be tested on a
# real phone at https://<owner>.github.io/chhhhhhho/.
#
# Deploys only from `main` (the github-pages environment restricts deployments
# to the default branch). Day-to-day development happens on the feature branch;
# to publish, fast-forward main to it. workflow_dispatch allows manual runs.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify (typecheck, data, tests)
        run: |
          npm run typecheck
          npm run validate-data
          npm run test
      - name: Build (Pages base path)
        run: npm run build
        env:
          VITE_BASE: /chhhhhhho/
      # E2E smoke: boots the REAL built game headless and plays the core
      # loops (new game → combat → hunt quest → craft → pet hatch → save/
      # reload). A red run blocks the deploy — broken builds never ship.
      - name: Install E2E browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke (headless playthrough)
        env:
          VITE_BASE: /chhhhhhho/
        run: |
          npx vite preview --port 4173 &
          sleep 4
          node tools/e2e-smoke.mjs http://localhost:4173/chhhhhhho
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (build_type=workflow) automatically if not already on,
          # so no manual Settings -> Pages toggle is required.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages deploys fail transiently ("Deployment failed, try again later")
      # a few times a week; retry twice with a pause instead of requiring a
      # manual re-run. First success short-circuits the rest.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        name: Wait before retry
        run: sleep 30
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        name: Wait before final retry
        run: sleep 60
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
