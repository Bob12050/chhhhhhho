<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1220" />
    <title>街デザイン比較</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 72px;
      }

      body {
        margin: 0;
        background: #0c1220;
        color: #f4f0df;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 60px;
        padding: max(10px, env(safe-area-inset-top)) 14px 10px;
        border-bottom: 1px solid #26324d;
        background: rgba(12, 18, 32, 0.96);
      }

      h1 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0;
      }

      nav {
        display: flex;
        gap: 6px;
      }

      nav a {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid #465678;
        border-radius: 6px;
        color: #f4f0df;
        font-weight: 700;
        text-decoration: none;
      }

      nav a.recommended {
        border-color: #f1ce62;
        color: #f1ce62;
      }

      main {
        width: min(100%, 560px);
        margin: 0 auto;
        padding: 18px 12px 56px;
      }

      section + section {
        margin-top: 34px;
      }

      .label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin: 0 2px 10px;
      }

      h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .recommendation {
        color: #f1ce62;
        font-size: 13px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #26324d;
        border-radius: 6px;
        background: #172036;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>街デザイン比較</h1>
      <nav aria-label="案を選ぶ">
        <a href="#option-1">1</a>
        <a class="recommended" href="#option-2">2</a>
        <a href="#option-3">3</a>
      </nav>
    </header>
    <main>
      <section id="option-1">
        <div class="label"><h2>案1</h2></div>
        <img src="previews/town-style-option-1.webp" alt="街デザイン案1" />
      </section>
      <section id="option-2">
        <div class="label">
          <h2>案2</h2>
          <span class="recommendation">おすすめ</span>
        </div>
        <img src="previews/town-style-option-2.webp" alt="街デザイン案2" />
      </section>
      <section id="option-3">
        <div class="label"><h2>案3</h2></div>
        <img src="previews/town-style-option-3.webp" alt="街デザイン案3" />
      </section>
    </main>
  </body>
</html>
