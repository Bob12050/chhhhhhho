<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- Portrait, mobile-first. viewport-fit=cover for safe-area insets. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- iOS home-screen icon (Android uses the web manifest icons). -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Pixel Action RPG</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0e0f1a;
        overflow: hidden;
        /* Block browser scroll / pinch-zoom over the game canvas. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-root {
        /* The Phaser canvas is appended here. */
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #game-root canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      @media (min-width: 700px) {
        #app {
          box-sizing: border-box;
          padding: 16px;
          background: #080c13;
        }
        #game-root {
          width: min(450px, calc((100vh - 32px) * 0.5625));
          height: min(800px, calc(100vh - 32px));
          aspect-ratio: 9 / 16;
          border: 1px solid rgba(225, 231, 239, 0.16);
          box-shadow: 0 18px 56px rgba(0, 0, 0, 0.52);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
